name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller customtkinter pillow tkinterdnd2

      - name: Install Ghostscript
        run: |
          choco install ghostscript --no-progress --limit-output
          $gsSrc = Get-ChildItem "C:\Program Files\gs\gs*" -Directory | Select-Object -First 1
          if ($gsSrc) {
            $versionDir = "gs" + $gsSrc.Name -replace '^gs', ''
            New-Item -ItemType Directory -Path "gs/$versionDir" -Force
            Copy-Item -Path "$($gsSrc.FullName)\*" -Destination "gs/$versionDir" -Recurse -Force
          } else {
            python download_gs.py
          }

      - name: Build executable
        run: python build_app.py

      - name: Upload exe to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/PDFtoCurves.exe
          asset_name: PDFtoCurves.exe
          tag: ${{ github.ref }}
          overwrite: true
