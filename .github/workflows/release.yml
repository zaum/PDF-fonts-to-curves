name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller customtkinter pillow tkinterdnd2

      - name: Install Ghostscript
        run: |
          choco install ghostscript --no-progress --limit-output
          $gsSrc = Get-ChildItem "C:\Program Files\gs\gs*" -Directory | Select-Object -First 1
          if ($gsSrc) {
            $versionDir = "gs" + $gsSrc.Name -replace '^gs', ''
            New-Item -ItemType Directory -Path "gs/$versionDir" -Force
            Copy-Item -Path "$($gsSrc.FullName)\*" -Destination "gs/$versionDir" -Recurse -Force
          } else {
            python download_gs.py
          }

      - name: Build executable
        run: python build_app.py

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PDFtoCurves.exe
          name: PDFtoCurves ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: false
          generate_release_notes: true

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller customtkinter pillow

      - name: Install Ghostscript
        run: brew install ghostscript

      - name: Build executable
        run: python build_app.py --macos

      - name: Create zip archive
        run: |
          cd dist
          zip -r ../PDFtoCurves-macOS.zip PDFtoCurves.app

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: PDFtoCurves-macOS.zip
          name: PDFtoCurves ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: false
          generate_release_notes: false
